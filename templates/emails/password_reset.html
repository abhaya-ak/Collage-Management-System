<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; color: #222; line-height: 1.5;">
  <div style="max-width: 520px; margin: 0 auto; border: 1px solid #e5e5e5; border-radius: 8px; padding: 24px;">
    <h2 style="margin-top: 0;">Password Reset</h2>
    <p>We received a request to reset your password.</p>
    <p>
      <a href="{{ reset_link }}"
         style="display: inline-block; background: #2563eb; color: #fff; padding: 10px 18px; border-radius: 6px; text-decoration: none;">
        Reset Password
      </a>
    </p>
    <p style="font-size: 12px; color: #888;">
      If the button doesn't work, copy this link into your browser:<br>
      {{ reset_link }}
    </p>
    <p style="font-size: 12px; color: #888;">If you did not request this, you can safely ignore this email.</p>
  </div>
</body>
</html>
